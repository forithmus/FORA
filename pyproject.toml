[tool.pytest.ini_options]
pythonpath = ["rad_rate", "vision_encoder"]
testpaths = ["tests"]
addopts = "--cov=rad_rate --cov=vision_encoder --cov-report=term-missing --cov-report=html --cov-report=xml"

[tool.coverage.run]
source = ["rad_rate", "vision_encoder"]
omit = ["*/setup.py"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.",
    "raise NotImplementedError",
    "if dist.is_initialized",
    "if debug",
]
show_missing = true
